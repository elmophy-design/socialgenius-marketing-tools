name: Staging E2E Tests

on:
  push:
    branches:
      - staging
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      ENABLE_DEBUG_EMAILS: 'true'
      NODE_ENV: 'staging'
      STAGING_API_URL: 'http://localhost:4000/api'
      STAGING_FRONTEND_URL: 'http://localhost:3000'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend deps
        run: |
          cd backend
          npm ci

      - name: Start backend
        run: |
          cd backend
          export ENABLE_DEBUG_EMAILS=true
          export NODE_ENV=staging
          export FRONTEND_URL=http://localhost:3000
          node src/index.js &

      - name: Install frontend deps & build
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Serve frontend
        run: |
          npx http-server ./frontend/build -p 3000 -c-1 &

      - name: Wait for services
        uses: jakejarvis/wait-action@v0.1.7
        with:
          urls: |
            http://localhost:4000/health
            http://localhost:3000
          timeout: 60

      - name: Run staging E2E test
        run: |
          cd frontend
          npm run test:staging:e2e
